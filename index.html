<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roman Numerals</title>
  <style>
    :root {
      --bg-1: #0f0c29;
      --bg-2: #302b63;
      --bg-3: #24243e;
      --accent: #ffd166;
      --accent-2: #ef476f;
      --text: #f4f4f8;
      --muted: rgba(244, 244, 248, 0.65);
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      background-size: 300% 300%;
      animation: gradient 18s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    @keyframes gradient {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }

    input[type="number"] {
      flex: 1;
      font-size: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 209, 102, 0.25);
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    button {
      font-size: 16px;
      font-weight: 600;
      padding: 14px 22px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      color: #1a1a2e;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    button:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(239, 71, 111, 0.35); }
    button:active { transform: translateY(0); }

    .result {
      min-height: 110px;
      border-radius: 18px;
      border: 1px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 4px;
      background: rgba(0, 0, 0, 0.2);
      transition: all 0.25s ease;
      word-break: break-all;
    }

    .result.placeholder {
      font-size: 15px;
      letter-spacing: normal;
      color: var(--muted);
      font-weight: 400;
    }

    .result.error {
      color: var(--accent-2);
      font-size: 16px;
      letter-spacing: normal;
      font-weight: 500;
    }

    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Roman Numerals</h1>
    <p class="subtitle">Enter a number from 1 to 3000</p>

    <div class="input-row">
      <input id="num" type="number" min="1" max="3000" placeholder="e.g. 1994" autofocus />
    </div>

    <div id="result" class="result placeholder">Result will appear here</div>
    <p class="hint">Range: 1–3000</p>
  </main>

  <script>
    const VALUES  = [1000, 900, 500, 400, 100, 90, 50, 40, 10, 9, 5, 4, 1];
    const SYMBOLS = ["M","CM","D","CD","C","XC","L","XL","X","IX","V","IV","I"];

    function toRoman(num) {
      if (!Number.isInteger(num) || num < 1 || num > 3000) {
        throw new Error("Number must be an integer between 1 and 3000");
      }
      let result = "";
      for (let i = 0; i < VALUES.length; i++) {
        while (num >= VALUES[i]) {
          num -= VALUES[i];
          result += SYMBOLS[i];
        }
      }
      return result;
    }

    const input = document.getElementById("num");
    const result = document.getElementById("result");

    function convert() {
      const raw = input.value.trim();
      if (raw === "") {
        showPlaceholder();
        return;
      }
      const num = Number(raw);
      try {
        const roman = toRoman(num);
        result.className = "result";
        result.textContent = roman;
      } catch (e) {
        result.className = "result error";
        result.textContent = e.message;
      }
    }

    function showPlaceholder() {
      result.className = "result placeholder";
      result.textContent = "Result will appear here";
    }

    input.addEventListener("input", () => {
      if (input.value.trim() === "") showPlaceholder();
      else convert();
    });
  </script>
</body>
</html>
